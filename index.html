<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Tetris</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tetris">
<meta name="theme-color" content="#111827">
<style>
  html, body {
    height: 100%;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  * {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: stretch;
    background: #111827;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #e5e7eb;
    box-sizing: border-box;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    height: 100vh;
    height: 100dvh;
    box-sizing: border-box;
    padding-top: calc(6px + env(safe-area-inset-top));
    padding-bottom: calc(6px + env(safe-area-inset-bottom));
    padding-left: calc(6px + env(safe-area-inset-left));
    padding-right: calc(6px + env(safe-area-inset-right));
  }
  .wrap.swapped {
    flex-direction: column-reverse;
  }

  /* Top stats bar */
  .topbar {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    gap: 6px;
    flex: 0 0 auto;
  }
  .box {
    background: #1f2937;
    border: 2px solid #374151;
    border-radius: 8px;
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-sizing: border-box;
  }
  .box.stat { flex: 1 1 0; gap: 4px; }
  .statline {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
  }
  .statline .lbl {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #9ca3af;
  }
  .statline .num {
    font-size: 17px;
    font-weight: bold;
    line-height: 1;
  }
  .statline.sub .num { font-size: 13px; color: #cbd5e1; }
  .box.next {
    flex: 0 0 auto;
    align-items: center;
    padding: 4px 6px;
  }
  #nextCanvas {
    background: #111827;
    border-radius: 4px;
    display: block;
    width: 52px;
    height: 34px;
  }
  .btncol {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 0 0 auto;
  }
  .tbtn {
    background: #374151;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    width: 44px;
    flex: 1 1 0;
    min-height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }
  .tbtn:active { background: #4f46e5; }

  /* Board fills remaining space, anchored to bottom */
  .stage {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  canvas#board {
    background: #1f2937;
    border: 3px solid #374151;
    border-radius: 6px;
    display: block;
    touch-action: none;
    height: 100%;
    width: auto;
    aspect-ratio: 1 / 2;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .controls-hint-desktop { display: none; }
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: white;
    border-radius: 6px;
    text-align: center;
    gap: 10px;
  }
  .stage {
    position: relative;
  }
  button {
    background: #4f46e5;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover { background: #6366f1; }

  #themeToast {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: bold;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  #themeToast.show { opacity: 1; }

  #versionBadge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.55);
    color: #9ca3af;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 10px;
    letter-spacing: 0.5px;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="box stat">
      <div class="statline"><span class="lbl">Score</span><span class="num" id="score">0</span></div>
      <div class="statline sub"><span class="lbl">Best</span><span class="num" id="best">0</span></div>
    </div>
    <div class="box stat">
      <div class="statline"><span class="lbl">Lines</span><span class="num" id="lines">0</span></div>
      <div class="statline sub"><span class="lbl">Level</span><span class="num" id="level">1</span></div>
    </div>
    <div class="box next">
      <canvas id="nextCanvas" width="120" height="80"></canvas>
    </div>
    <div class="btncol">
      <button class="tbtn" id="btnSwap">⇄</button>
      <button class="tbtn" id="btnPause">⏸</button>
    </div>
  </div>
  <div class="stage">
    <canvas id="board" width="300" height="600"></canvas>
    <div id="versionBadge">v22</div>
    <div id="themeToast"></div>
    <div id="overlay">
      <div id="overlayText" style="font-size:24px;font-weight:bold;">Paused</div>
      <div id="overlayScores" style="font-size:13px;line-height:1.7;color:#d1d5db;margin:4px 0;"></div>
      <button id="overlayBtn">Resume</button>
    </div>
  </div>
</div>

<script>
const COLS = 10, ROWS = 20, SIZE = 30;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nctx = nextCanvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayText = document.getElementById('overlayText');
const overlayBtn = document.getElementById('overlayBtn');

const THEMES = [
  // Classic multicolor beveled
  { name: 'Classic', bg: '#1f2937', style: 'bevel', anim: 'flash', colors: { I: '#22d3ee', J: '#3b82f6', L: '#f97316', O: '#facc15', S: '#22c55e', T: '#a855f7', Z: '#ef4444' } },
  // Neon glow, saturated multicolor
  { name: 'Neon', bg: '#0f0524', style: 'glow', anim: 'pulse', colors: { I: '#00fff5', J: '#2d7bff', L: '#ff9100', O: '#faff00', S: '#00ff85', T: '#e000ff', Z: '#ff003c' } },
  // Monochrome green (matrix / terminal)
  { name: 'Matrix', bg: '#000000', style: 'glow', anim: 'pulse', colors: { I: '#39ff14', J: '#2fdd0f', L: '#7fff5e', O: '#b6ff9e', S: '#1fa806', T: '#5eff3a', Z: '#0f8a00' } },
  // Hot magenta/cyan high-contrast on black (synthwave)
  { name: 'Synthwave', bg: '#0d0221', style: 'glow', anim: 'sweep', colors: { I: '#00e5ff', J: '#0077ff', L: '#ff2ec4', O: '#ffd300', S: '#00ffa3', T: '#b026ff', Z: '#ff2a6d' } },
  // Chrome / metallic monochrome
  { name: 'Chrome', bg: '#0a0a0a', style: 'chrome', anim: 'shimmer', colors: { I: '#f3f4f6', J: '#9ca3af', L: '#d1d5db', O: '#e5e7eb', S: '#a1a1aa', T: '#6b7280', Z: '#4b5563' } },
  // Molten lava, warm mono-ish
  { name: 'Molten', bg: '#1a0500', style: 'glow', anim: 'sweep', colors: { I: '#ffd166', J: '#ff6b35', L: '#f77f00', O: '#ffee32', S: '#ff9e00', T: '#e5383b', Z: '#c1121f' } },
  // Ice / crystal glass, cool tones
  { name: 'Ice', bg: '#020617', style: 'glass', anim: 'shatter', colors: { I: '#7dd3fc', J: '#60a5fa', L: '#a5f3fc', O: '#e0f2fe', S: '#38bdf8', T: '#818cf8', Z: '#0ea5e9' } },
  // Candy / vaporwave glass, pastel high-key
  { name: 'Candy', bg: '#2b0a3d', style: 'glass', anim: 'shatter', colors: { I: '#ff8fab', J: '#c77dff', L: '#ffb3c6', O: '#fff3b0', S: '#b8f2e6', T: '#e0aaff', Z: '#ff5d8f' } },
  // All-white mono, ultra high contrast on black
  { name: 'Mono', bg: '#000000', style: 'bevel', anim: 'flash', colors: { I: '#ffffff', J: '#e5e5e5', L: '#f5f5f5', O: '#ffffff', S: '#d4d4d4', T: '#ededed', Z: '#cccccc' } },
  // Amber CRT / retro arcade single-hue
  { name: 'Amber', bg: '#180f00', style: 'glow', anim: 'sweep', colors: { I: '#ffb000', J: '#ff9500', L: '#ffc233', O: '#ffd966', S: '#e8890c', T: '#ffbf47', Z: '#cc7a00' } },
  // Bold primary blocks on stark background (Bauhaus)
  { name: 'Bauhaus', bg: '#111111', style: 'bevel', anim: 'flash', colors: { I: '#e63946', J: '#1d3557', L: '#f1a208', O: '#fee440', S: '#2a9d8f', T: '#3a86ff', Z: '#e63946' } }
];
const THEME_INTERVAL = 500; // points per theme change
let themeIndex = 0;
let COLORS = THEMES[0].colors;

const SHAPES = {
  I: [[0,1],[1,1],[2,1],[3,1]],
  J: [[0,0],[0,1],[1,1],[2,1]],
  L: [[2,0],[0,1],[1,1],[2,1]],
  O: [[0,0],[1,0],[0,1],[1,1]],
  S: [[1,0],[2,0],[0,1],[1,1]],
  T: [[1,0],[0,1],[1,1],[2,1]],
  Z: [[0,0],[1,0],[1,1],[2,1]]
};

function rotate(cells) {
  // rotate around center approx (using bounding box)
  const maxX = Math.max(...cells.map(c=>c[0]));
  const maxY = Math.max(...cells.map(c=>c[1]));
  return cells.map(([x,y]) => [maxY - y, x]);
}

function randomPiece() {
  const keys = Object.keys(SHAPES);
  const key = keys[Math.floor(Math.random()*keys.length)];
  return { key, cells: SHAPES[key].map(c=>[...c]), color: COLORS[key] };
}

function currentBg() {
  return THEMES[themeIndex].bg;
}

let grid, current, next, pos, score, lines, level, dropInterval, dropTimer, lastTime, running, paused, gameOver;

function initGame() {
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(null));
  score = 0; lines = 0; level = 1;
  themeIndex = 0;
  COLORS = THEMES[0].colors;
  dropInterval = 800;
  current = randomPiece();
  next = randomPiece();
  pos = { x: 3, y: -1 };
  running = true; paused = false; gameOver = false;
  clearing = false; clearRows = [];
  scoreRecorded = false;
  document.getElementById('overlayScores').innerHTML = '';
  updateStats();
  refreshBest();
  overlay.style.display = 'none';
}

// --- High score persistence (works when hosted, e.g. GitHub Pages) ---
const SCORE_KEY = 'tetrisHighScores';
function loadScores() {
  try { return JSON.parse(localStorage.getItem(SCORE_KEY)) || []; }
  catch (e) { return []; }
}
function saveScores(arr) {
  try { localStorage.setItem(SCORE_KEY, JSON.stringify(arr)); } catch (e) {}
}
function recordScore(s) {
  const arr = loadScores();
  arr.push({ score: s, date: new Date().toISOString().slice(0, 10) });
  arr.sort((a, b) => b.score - a.score);
  const top = arr.slice(0, 5);
  saveScores(top);
  return top;
}
function bestScore() {
  const arr = loadScores();
  return arr.length ? arr[0].score : 0;
}
function refreshBest() {
  document.getElementById('best').textContent = bestScore();
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('lines').textContent = lines;
  document.getElementById('level').textContent = level;
  checkTheme();
}

function checkTheme() {
  const idx = Math.min(THEMES.length - 1, Math.floor(score / THEME_INTERVAL));
  if (idx !== themeIndex) {
    themeIndex = idx;
    COLORS = THEMES[themeIndex].colors;
    current.color = COLORS[current.key];
    next.color = COLORS[next.key];
    showThemeToast(THEMES[themeIndex].name);
  }
}

let toastTimer = null;
function showThemeToast(name) {
  const toast = document.getElementById('themeToast');
  toast.textContent = 'Theme: ' + name + '!';
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
}

function collide(cells, ox, oy) {
  for (const [cx, cy] of cells) {
    const x = cx + ox, y = cy + oy;
    if (x < 0 || x >= COLS || y >= ROWS) return true;
    if (y >= 0 && grid[y][x]) return true;
  }
  return false;
}

function merge() {
  for (const [cx, cy] of current.cells) {
    const x = cx + pos.x, y = cy + pos.y;
    if (y >= 0) grid[y][x] = current.color;
  }
}

function getFullRows() {
  const rows = [];
  for (let y = 0; y < ROWS; y++) {
    if (grid[y].every(cell => cell)) rows.push(y);
  }
  return rows;
}

let clearing = false, clearRows = [], clearCount = 0, clearStart = 0, clearDuration = 0;

function startClear(rows) {
  clearing = true;
  clearRows = rows.slice();
  clearCount = rows.length;
  clearStart = performance.now();
  clearDuration = clearCount >= 4 ? 430 : clearCount === 3 ? 320 : 190;
}

function finishClear() {
  const cleared = clearRows.length;
  const clearSet = new Set(clearRows);
  const kept = grid.filter((_, y) => !clearSet.has(y));
  grid.length = 0;
  const pad = ROWS - kept.length;
  for (let i = 0; i < pad; i++) grid.push(Array(COLS).fill(null));
  for (const row of kept) grid.push(row);

  const points = [0, 100, 300, 500, 800][cleared] * level;
  score += points;
  lines += cleared;
  level = Math.floor(lines / 10) + 1;
  dropInterval = Math.max(100, 800 - (level - 1) * 70);

  clearing = false;
  clearRows = [];
  spawn();
  updateStats();
}

function spawn() {
  current = next;
  next = randomPiece();
  pos = { x: 3, y: -1 };
  if (collide(current.cells, pos.x, pos.y)) {
    gameOver = true;
    running = false;
    endGame();
  }
}

let scoreRecorded = false;
function endGame() {
  const prevBest = bestScore();
  let top = loadScores();
  if (!scoreRecorded) {
    top = recordScore(score);
    scoreRecorded = true;
  }
  const isRecord = score > 0 && score >= (top[0] ? top[0].score : 0) && score > prevBest;
  overlayText.textContent = isRecord ? 'New Best! ' + score : 'Game Over — ' + score;
  const rows = top.map((e, i) => {
    const mark = (e.score === score && i === top.findIndex(x => x.score === score)) ? ' ◄' : '';
    return (i + 1) + '. ' + e.score + mark;
  }).join('<br>');
  document.getElementById('overlayScores').innerHTML =
    '<div style="margin-top:6px;font-weight:bold;color:#9ca3af;">TOP SCORES</div>' + rows;
  overlayBtn.textContent = 'Restart';
  overlay.style.display = 'flex';
  refreshBest();
}

function hardDrop() {
  if (clearing) return;
  while (!collide(current.cells, pos.x, pos.y + 1)) {
    pos.y++;
    score += 2;
  }
  lockPiece();
}

function lockPiece() {
  merge();
  const full = getFullRows();
  if (full.length > 0) {
    startClear(full);
  } else {
    spawn();
    updateStats();
  }
}

function move(dx) {
  if (clearing) return;
  if (!collide(current.cells, pos.x + dx, pos.y)) pos.x += dx;
}

function softDrop() {
  if (clearing) return;
  if (!collide(current.cells, pos.x, pos.y + 1)) {
    pos.y++;
    score += 1;
    updateStats();
  } else {
    lockPiece();
  }
}

function tryRotate() {
  if (clearing) return;
  const rotated = rotate(current.cells);
  // normalize to avoid negative coords
  const minX = Math.min(...rotated.map(c=>c[0]));
  const minY = Math.min(...rotated.map(c=>c[1]));
  const norm = rotated.map(([x,y]) => [x - minX, y - minY]);
  const kicks = [0, -1, 1, -2, 2];
  for (const k of kicks) {
    if (!collide(norm, pos.x + k, pos.y)) {
      current.cells = norm;
      pos.x += k;
      return;
    }
  }
}

function shade(hex, amt) {
  // amt: -1..1, negative darkens, positive lightens
  let c = hex.replace('#','');
  if (c.length === 3) c = c.split('').map(ch=>ch+ch).join('');
  let r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
  const f = amt < 0 ? (v) => v * (1 + amt) : (v) => v + (255 - v) * amt;
  r = Math.max(0, Math.min(255, f(r)));
  g = Math.max(0, Math.min(255, f(g)));
  b = Math.max(0, Math.min(255, f(b)));
  return `rgb(${r|0},${g|0},${b|0})`;
}

function drawCell(c, x, y, color, size) {
  const s = size || SIZE;
  const px = x * s, py = y * s;
  const pad = 1;
  const w = s - pad, h = s - pad;
  const style = THEMES[themeIndex] ? THEMES[themeIndex].style : 'bevel';

  if (style === 'chrome') {
    const grad = c.createLinearGradient(px, py, px, py + h);
    grad.addColorStop(0, shade(color, 0.55));
    grad.addColorStop(0.35, shade(color, 0.05));
    grad.addColorStop(0.65, shade(color, -0.25));
    grad.addColorStop(1, shade(color, -0.55));
    c.fillStyle = grad;
    c.fillRect(px, py, w, h);
    c.strokeStyle = 'rgba(255,255,255,0.5)';
    c.lineWidth = 1;
    c.strokeRect(px + 0.5, py + 0.5, w - 1, h - 1);
    // horizontal specular streak
    c.fillStyle = 'rgba(255,255,255,0.35)';
    c.fillRect(px + 1, py + h * 0.15, w - 2, Math.max(1, h * 0.12));
  } else if (style === 'glass') {
    const grad = c.createLinearGradient(px, py, px + w, py + h);
    grad.addColorStop(0, shade(color, 0.35));
    grad.addColorStop(0.5, color);
    grad.addColorStop(1, shade(color, -0.3));
    c.fillStyle = grad;
    c.globalAlpha = 0.88;
    c.fillRect(px, py, w, h);
    c.globalAlpha = 1;
    // glossy highlight top-left triangle
    c.fillStyle = 'rgba(255,255,255,0.45)';
    c.beginPath();
    c.moveTo(px + 2, py + 2);
    c.lineTo(px + w * 0.6, py + 2);
    c.lineTo(px + 2, py + h * 0.6);
    c.closePath();
    c.fill();
    c.strokeStyle = 'rgba(255,255,255,0.3)';
    c.strokeRect(px + 0.5, py + 0.5, w - 1, h - 1);
  } else if (style === 'glow') {
    c.save();
    c.shadowColor = color;
    c.shadowBlur = size ? 4 : 10;
    c.fillStyle = shade(color, -0.1);
    c.fillRect(px, py, w, h);
    c.restore();
    c.fillStyle = 'rgba(255,255,255,0.25)';
    c.fillRect(px + 2, py + 2, w - 4, Math.max(1, h * 0.25));
    c.strokeStyle = shade(color, 0.4);
    c.lineWidth = 1.5;
    c.strokeRect(px + 0.75, py + 0.75, w - 1.5, h - 1.5);
  } else {
    // bevel (classic pseudo-3D block)
    c.fillStyle = color;
    c.fillRect(px, py, w, h);
    const bevel = Math.max(2, Math.round(s * 0.14));
    // top highlight
    c.fillStyle = shade(color, 0.45);
    c.beginPath();
    c.moveTo(px, py);
    c.lineTo(px + w, py);
    c.lineTo(px + w - bevel, py + bevel);
    c.lineTo(px + bevel, py + bevel);
    c.closePath();
    c.fill();
    // left highlight
    c.fillStyle = shade(color, 0.2);
    c.beginPath();
    c.moveTo(px, py);
    c.lineTo(px + bevel, py + bevel);
    c.lineTo(px + bevel, py + h - bevel);
    c.lineTo(px, py + h);
    c.closePath();
    c.fill();
    // bottom shadow
    c.fillStyle = shade(color, -0.35);
    c.beginPath();
    c.moveTo(px, py + h);
    c.lineTo(px + bevel, py + h - bevel);
    c.lineTo(px + w - bevel, py + h - bevel);
    c.lineTo(px + w, py + h);
    c.closePath();
    c.fill();
    // right shadow
    c.fillStyle = shade(color, -0.45);
    c.beginPath();
    c.moveTo(px + w, py);
    c.lineTo(px + w - bevel, py + bevel);
    c.lineTo(px + w - bevel, py + h - bevel);
    c.lineTo(px + w, py + h);
    c.closePath();
    c.fill();
  }
}

function drawClearAnim(p) {
  const anim = THEMES[themeIndex].anim || 'flash';
  const big = clearCount >= 4;        // full Tetris
  const mid = clearCount === 3;
  const boardW = COLS * SIZE, boardH = ROWS * SIZE;
  const fade = 1 - p;

  ctx.save();
  if (anim === 'flash') {
    // white bars fading out; full-board flash on Tetris
    ctx.globalAlpha = fade * (big ? 0.95 : mid ? 0.7 : 0.55);
    ctx.fillStyle = '#ffffff';
    for (const row of clearRows) ctx.fillRect(0, row * SIZE, boardW, SIZE);
    if (big) {
      ctx.globalAlpha = fade * 0.25;
      ctx.fillRect(0, 0, boardW, boardH);
    }
  } else if (anim === 'pulse') {
    // additive neon bloom on cleared rows
    ctx.globalCompositeOperation = 'lighter';
    const pulse = Math.sin(p * Math.PI); // rise then fall
    ctx.globalAlpha = pulse * (big ? 0.9 : mid ? 0.6 : 0.45);
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = big ? 30 : 16;
    ctx.fillStyle = '#ffffff';
    for (const row of clearRows) ctx.fillRect(0, row * SIZE, boardW, SIZE);
  } else if (anim === 'sweep') {
    // bright band sweeps across the cleared rows
    const bandW = SIZE * 2.4;
    const travel = boardW + bandW;
    const x = p * travel - bandW;
    const grad = ctx.createLinearGradient(x, 0, x + bandW, 0);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(0.5, big ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.7)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    for (const row of clearRows) ctx.fillRect(0, row * SIZE, boardW, SIZE);
    if (big) {
      // second trailing band for extra flash on Tetris
      const x2 = (p * travel - bandW) * 0.6;
      const g2 = ctx.createLinearGradient(x2, 0, x2 + bandW, 0);
      g2.addColorStop(0, 'rgba(255,255,255,0)');
      g2.addColorStop(0.5, 'rgba(255,255,255,0.4)');
      g2.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g2;
      for (const row of clearRows) ctx.fillRect(0, row * SIZE, boardW, SIZE);
    }
  } else if (anim === 'shimmer') {
    // metallic diagonal sheen sweeping across rows
    const bandW = SIZE * 3;
    const x = p * (boardW + bandW) - bandW;
    const grad = ctx.createLinearGradient(x, 0, x + bandW, boardH);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(0.4, 'rgba(200,220,255,0.5)');
    grad.addColorStop(0.5, big ? 'rgba(255,255,255,1)' : 'rgba(255,255,255,0.8)');
    grad.addColorStop(0.6, 'rgba(200,220,255,0.5)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    for (const row of clearRows) ctx.fillRect(0, row * SIZE, boardW, SIZE);
  } else if (anim === 'shatter') {
    // cells shrink, drift, and fade like breaking glass
    for (const row of clearRows) {
      for (let x = 0; x < COLS; x++) {
        const base = grid[row][x] || '#ffffff';
        // erase original cell
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = currentBg();
        ctx.fillRect(x * SIZE, row * SIZE, SIZE, SIZE);
        // shrinking fragment
        const s = SIZE * (1 - p) * 0.9;
        const jitter = (((x * 37 + row * 91) % 13) - 6) * p * 2.2;
        const cx = x * SIZE + (SIZE - s) / 2 + jitter;
        const cy = row * SIZE + (SIZE - s) / 2 + p * p * 26;
        ctx.globalAlpha = (1 - p) * (big ? 1 : 0.85);
        ctx.fillStyle = base;
        ctx.fillRect(cx, cy, s, s);
        ctx.globalAlpha = (1 - p) * 0.6;
        ctx.fillStyle = shade(base, 0.5);
        ctx.fillRect(cx, cy, s, Math.max(1, s * 0.3));
      }
    }
  }
  ctx.restore();
}

function draw() {
  ctx.fillStyle = currentBg();
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // faint vertical column guides
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  for (let i = 1; i < COLS; i++) {
    const gx = i * SIZE;
    ctx.beginPath();
    ctx.moveTo(gx, 0);
    ctx.lineTo(gx, ROWS * SIZE);
    ctx.stroke();
  }
  ctx.restore();

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (grid[y][x]) drawCell(ctx, x, y, grid[y][x]);
    }
  }

  for (const [cx, cy] of current.cells) {
    const x = cx + pos.x, y = cy + pos.y;
    if (y >= 0) drawCell(ctx, x, y, current.color);
  }

  if (clearing) {
    const p = Math.min(1, (performance.now() - clearStart) / clearDuration);
    drawClearAnim(p);
  }

  // next piece preview
  nctx.fillStyle = '#111827';
  nctx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
  const cells = next.cells;
  const maxX = Math.max(...cells.map(c=>c[0]));
  const maxY = Math.max(...cells.map(c=>c[1]));
  const offX = (4 - (maxX+1)) / 2;
  const offY = (2 - (maxY+1)) / 2;
  for (const [cx, cy] of cells) {
    drawCell(nctx, cx + offX + 0.5, cy + offY + 0.5, next.color);
  }
}

function gameLoop(time) {
  if (!lastTime) lastTime = time;
  const delta = time - lastTime;
  if (running && !paused) {
    if (clearing) {
      if (performance.now() - clearStart >= clearDuration) {
        finishClear();
      }
      draw();
    } else {
      dropTimer = (dropTimer || 0) + delta;
      if (dropTimer > dropInterval) {
        dropTimer = 0;
        if (!collide(current.cells, pos.x, pos.y + 1)) {
          pos.y++;
        } else {
          lockPiece();
        }
      }
      draw();
    }
  }
  lastTime = time;
  requestAnimationFrame(gameLoop);
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  if (paused) {
    overlayText.textContent = 'Paused';
    overlayBtn.textContent = 'Resume';
    overlay.style.display = 'flex';
  } else {
    overlay.style.display = 'none';
  }
}

document.addEventListener('keydown', (e) => {
  if (!running && e.code !== 'Space') return;
  if (paused && e.key.toLowerCase() !== 'p') return;
  switch (e.code) {
    case 'ArrowLeft': move(-1); draw(); break;
    case 'ArrowRight': move(1); draw(); break;
    case 'ArrowDown': softDrop(); draw(); break;
    case 'ArrowUp': tryRotate(); draw(); break;
    case 'Space': e.preventDefault(); if (running && !paused) { hardDrop(); draw(); } break;
    case 'KeyP': togglePause(); break;
  }
});

overlayBtn.addEventListener('click', () => {
  if (!running) {
    initGame();
  } else {
    togglePause();
  }
});

// --- Pause button ---
const pauseBtn = document.getElementById('btnPause');
pauseBtn.addEventListener('touchstart', (e) => { e.preventDefault(); togglePause(); });
pauseBtn.addEventListener('click', (e) => { e.preventDefault(); togglePause(); });

function toggleSwap() {
  document.querySelector('.wrap').classList.toggle('swapped');
}
const swapBtn = document.getElementById('btnSwap');
swapBtn.addEventListener('touchstart', (e) => { e.preventDefault(); toggleSwap(); });
swapBtn.addEventListener('click', (e) => { e.preventDefault(); toggleSwap(); });

// --- Prevent iOS zoom gestures (pinch, double-tap) and text-selection callouts ---
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('gesturechange', (e) => e.preventDefault());
document.addEventListener('gestureend', (e) => e.preventDefault());
document.addEventListener('touchmove', (e) => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
let lastTapTime = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTapTime < 350) e.preventDefault();
  lastTapTime = now;
}, { passive: false });

// --- Touch controls ---
// Horizontal swipe: moves a number of columns proportional to how far you swipe
//   (short swipe = 1 column, longer swipe = more). Locked to horizontal once chosen.
// Vertical drag down: soft-drops in sync with your finger; releasing returns to normal fall.
// Big upward flick: hard drop. Quick tap: rotate.
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
let axisLock = null, lastDragY = 0, minDragDy = 0, colsMoved = 0;
const AXIS_LOCK_THRESHOLD = 8;
const HARD_DROP_SWIPE_UP = 55;
const H_STEP_PX = 22;  // finger travel that equals one column of horizontal movement

canvas.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchStartTime = Date.now();
  lastDragY = t.clientY;
  minDragDy = 0;
  maxDragDy = 0;
  colsMoved = 0;
  axisLock = null;
}, { passive: true });

canvas.addEventListener('touchmove', (e) => {
  if (!running || paused || clearing) return;
  const t = e.touches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;

  if (axisLock === null) {
    if (Math.abs(dx) < AXIS_LOCK_THRESHOLD && Math.abs(dy) < AXIS_LOCK_THRESHOLD) return;
    axisLock = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
  }

  if (axisLock === 'x') {
    // target column count scales with swipe distance; step toward it one col at a time
    const targetCols = Math.trunc(dx / H_STEP_PX);
    while (colsMoved < targetCols) { move(1); colsMoved++; }
    while (colsMoved > targetCols) { move(-1); colsMoved--; }
    draw();
  } else {
    const rect = canvas.getBoundingClientRect();
    const cellPx = rect.width / COLS;
    minDragDy = Math.min(minDragDy, dy);
    maxDragDy = Math.max(maxDragDy, dy);
    while (t.clientY - lastDragY > cellPx) {
      if (!collide(current.cells, pos.x, pos.y + 1)) {
        pos.y++;
        score += 1;
        lastDragY += cellPx;
      } else {
        lockPiece();
        lastDragY = t.clientY;
        break;
      }
    }
    updateStats();
    draw();
  }
}, { passive: true });

canvas.addEventListener('touchend', () => {
  if (!running || paused) return;
  const elapsed = Date.now() - touchStartTime;
  if (axisLock === null && elapsed < 250) {
    // quick tap = rotate
    tryRotate();
    draw();
  } else if (axisLock === 'y') {
    if (minDragDy < -HARD_DROP_SWIPE_UP) {
      // upward flick = hard drop
      hardDrop();
      draw();
    } else if (maxDragDy > 40 && (maxDragDy / Math.max(1, elapsed)) > 0.7) {
      // fast downward flick = hard drop (high velocity, decent distance)
      hardDrop();
      draw();
    }
  }
}, { passive: true });

// initial idle state
grid = Array.from({length: ROWS}, () => Array(COLS).fill(null));
current = randomPiece();
next = randomPiece();
pos = { x: 3, y: -1 };
running = false;
refreshBest();
draw();
overlayText.textContent = 'Tetris';
overlayBtn.textContent = 'Start';
overlay.style.display = 'flex';

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
